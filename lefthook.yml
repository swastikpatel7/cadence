pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: pnpm biome check --write {staged_files} --no-errors-on-unmatched
      stage_fixed: true
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: "*.go"
      # golangci-lint v2 can't expand `./...` from the repo root when
      # there's no module at the root — only in go.work members. List
      # the workspace modules explicitly.
      run: golangci-lint run --fix ./apps/api/... ./pkg/...
      stage_fixed: true
    go-mod-tidy:
      glob: "go.{mod,sum}"
      run: go work sync

pre-push:
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm turbo typecheck
    go-vet:
      glob: "*.go"
      run: go vet ./...
