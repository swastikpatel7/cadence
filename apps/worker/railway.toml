# Railway service config for `cadence-worker`.
#
# In Railway dashboard:
#   - Source: this repo
#   - Root Directory: / (repo root)
#   - Config Path: apps/worker/railway.toml
#
# Worker has no public port and no preDeployCommand — schema is owned by
# the api service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"

[deploy]
startCommand = "/app/worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
