<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Cadence icon render</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: transparent;
  }
  svg { display: block; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7d4ddf"/>
      <stop offset="100%" stop-color="#5a6dd9"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#vio)"/>
  <rect x="0" y="0" width="256" height="2" rx="1" fill="#ffffff" opacity="0.22"/>
  <text
    x="128"
    y="180"
    text-anchor="middle"
    font-family="Geist, system-ui, sans-serif"
    font-weight="600"
    font-size="170"
    letter-spacing="-8"
    fill="#ffffff"
  >c.</text>
</svg>
</body>
</html>
