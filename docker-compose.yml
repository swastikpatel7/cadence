services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cadence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence
    # Host 5433 to avoid clashing with a local Postgres install or other
    # work containers. Container-internal stays on 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cadence", "-d", "cadence"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cadence-redis
    restart: unless-stopped
    # Host 6380 to avoid clashing with other local Redis instances (e.g.
    # consumer-redis from work). Container-internal stays on 6379.
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
